<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="http://primefaces.org/ui">
    <h:head>
        <title>SubCategory</title>
        <link href="resources/images/arrow.png" rel="shortcut icon" type="image/x-icon" />         
        <link rel="stylesheet" type="text/css" href="style.css?ln=css"/>
        <script  language="javascript">
            function confirmDelete()
            {
                return confirm('Are you sure you want to delete this current record?');
            }
            function alertSave()
            {
                return alert('Record saved successfully!');
            }
        </script> 
    </h:head>
    <f:event listener="#{navigationBean.checkAccessDenied('8', 'View')}" type="preRenderView" />
    <h:body>
        <ui:include src="Menu.xhtml"/>
        <h:form id="form" styleClass="clsMainFrom">

            <h:panelGrid styleClass="clsGridMainHeader" columns="1">
                <h:outputLabel styleClass="clsLabelTop" id="olblcategoryHeader" value="#{langsys['Item']} - #{langsys['Subcategory']}"/>
            </h:panelGrid>

            <h:panelGrid styleClass="clsGridMainInput" columns="4">
                <h:outputLabel  value="#{langsys['Category']} #{langsys['Name']}:"/>
                <h:selectOneMenu styleClass="clsMenu" id="menuCategory" value="#{subCategory.categoryId}">
                    <f:selectItem itemLabel="" itemValue="0"/>
                    <f:selectItems value="#{categoryBean.categories}" var="c" itemLabel="#{c.categoryName}" itemValue="#{c.categoryId}"/>
                </h:selectOneMenu>
                
                <h:outputLabel  value="#{langsys['Subcategory']} #{langsys['Name']}:"/>
                <h:inputText styleClass="clsInput" id="itxtSubCategoryName" value="#{subCategory.subCategoryName}" autocomplete="off">
                </h:inputText>
            </h:panelGrid>

            <h:panelGrid styleClass="clsGridMainCommands" columns="1">
            <h:panelGrid styleClass="clsGridMainCommands1" columns="4">
                <h:commandButton styleClass="clsButton" id="cmdbSave" value="#{langsys['Save']}">
                    <f:ajax listener="#{subCategoryBean.saveSubCategory(subCategory)}" execute="@form" render="@form" />
                </h:commandButton>
                <h:commandButton styleClass="clsButton" id="cmdbClear" value="#{langsys['Clear']}">
                    <f:ajax listener="#{subCategoryBean.clearSubCategory(subCategory)}" execute="@form" render="@form" />
                </h:commandButton>
                <h:commandButton styleClass="clsButton" id="cmdbDelete" value="#{langsys['Delete']}" onclick="return confirmDelete();">
                    <f:ajax listener="#{subCategoryBean.deleteSubCategoryByObject(subCategory)}" execute="@form" render="@form" />
                </h:commandButton>
            </h:panelGrid>
            </h:panelGrid>

            <h:panelGrid styleClass="clsGridMainMessages" columns="1">
                <h:outputLabel styleClass="clsActionMessage" id="olblActionMessage" value="#{subCategoryBean.actionMessage}"/>
                <h:messages id="msgsMainMessage" style="color: red"/><br/>
            </h:panelGrid>
            
            <h:panelGrid styleClass="clsGridMainSearch" columns="1">
                <h:outputLabel id="olblMainSearch" value="#{langsys['Search']} #{langsys['Subcategory']}"/>
                <h:outputLabel id="olblMainSearchDesc" value="(#{langsys['Type']} #{langsys['Category']} #{langsys['or']} #{langsys['Subcategory']} #{langsys['Name']} #{langsys['to']} #{langsys['search']}!)"/>
                <h:inputText id="itxtMainSearch" value="#{subCategoryBean.searchSubCategoryName}" autocomplete="off">
                    <f:ajax event="keyup" render="dtblSubCategory"/>
                </h:inputText>
            </h:panelGrid>

            <p:dataTable id="dtblSubCategory" value="#{subCategoryBean.getSubCategoriesByCatSubcatName(subCategoryBean.searchSubCategoryName)}" var="sc" 
                         > 
                <p:column>
                    <!-- column header -->
                    <f:facet name="header">#{langsys['Category']} #{langsys['Name']}</f:facet>
                    <!-- row record -->
                    #{sc.categoryName}
                </p:column>
                
                <p:column>
                    <!-- column header -->
                    <f:facet name="header">#{langsys['Subcategory']} #{langsys['Name']}</f:facet>
                    <!-- row record -->
                    #{sc.subCategoryName}
                </p:column>

                <p:column>
                    <!-- column header -->
                    <f:facet name="header">#{langsys['Action']}</f:facet>
                    <!-- row record -->
                    <h:commandLink value="#{langsys['Edit']}">
                        <f:ajax listener="#{subCategoryBean.displaySubCategory(sc,subCategory)}" execute="@form" render="@form"/>
                    </h:commandLink>
                    &nbsp;
                </p:column>
                
            </p:dataTable>

        </h:form>
    </h:body>
</html>
