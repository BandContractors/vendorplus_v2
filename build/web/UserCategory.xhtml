<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
    <h:head>
        <title>User Category</title>
        <link href="resources/images/arrow.png" rel="shortcut icon" type="image/x-icon" />         
        <link rel="stylesheet" type="text/css" href="style.css?ln=css"/>
        <script  language="javascript">
            function confirmDelete()
            {
                return confirm('Are you sure you want to delete this current record?');
            }
            function alertSave()
            {
                return alert('Record saved successfully!');
            }
        </script> 
    </h:head>
    <f:event listener="#{navigationBean.checkAccessDenied('88', 'View')}" type="preRenderView" />
    <h:body>
        <ui:include src="Menu.xhtml"/>
        <h:form id="form" styleClass="clsMainFrom">

            <h:panelGrid styleClass="clsGridMainHeader" columns="1">
                <h:outputLabel styleClass="clsLabelTop" id="olblcategoryHeader" value="#{langsys['User']} #{langsys['Category']}"/>
            </h:panelGrid>

            <h:panelGrid styleClass="clsGridMainInput" columns="2">
                <h:outputLabel  value="#{langsys['User']} #{langsys['Category']} #{langsys['Name']}:"/>
                <h:inputText styleClass="clsInput" id="itxtUserCategoryName" value="#{userCategory.userCategoryName}" autocomplete="off">
                </h:inputText>
            </h:panelGrid>

            <h:panelGrid styleClass="clsGridMainCommands" columns="2">
            <h:panelGrid styleClass="clsGridMainCommands1" columns="4">
                <h:commandButton styleClass="clsButton" id="cmdbSave" value="#{langsys['Save']}">
                    <f:ajax listener="#{userCategoryBean.saveUserCategory(userCategory)}" execute="@form" render="@form" />
                </h:commandButton>
                <h:commandButton styleClass="clsButton" id="cmdbClear" value="#{langsys['Clear']}">
                    <f:ajax listener="#{userCategoryBean.clearUserCategory(userCategory)}" execute="@form" render="@form" />
                </h:commandButton>
                <h:commandButton styleClass="clsButton" id="cmdbDelete" value="#{langsys['Delete']}" onclick="return confirmDelete();">
                    <f:ajax listener="#{userCategoryBean.deleteUserCategoryByObject(userCategory)}" execute="@form" render="@form" />
                </h:commandButton>
            </h:panelGrid>
            <h:panelGrid styleClass="clsGridMainCommands2" columns="4">
            </h:panelGrid>

            </h:panelGrid>

            <h:panelGrid styleClass="clsGridMainMessages" columns="1">
                <h:outputLabel styleClass="clsActionMessage" id="olblActionMessage" value="#{userCategoryBean.actionMessage}"/>
                <h:messages id="msgsMainMessage" style="color: red"/><br/>
            </h:panelGrid>
            
            <h:panelGrid styleClass="clsGridMainSearch" columns="1">
                <h:outputLabel id="olblMainSearch" value="#{langsys['Search']} #{langsys['User']} #{langsys['Category']}"/>
                <h:outputLabel id="olblMainSearchDesc" value="(#{langsys['Type']} #{langsys['User']} #{langsys['Category']} #{langsys['Name']} #{langsys['to']} #{langsys['search']}!)"/>
                <h:inputText id="itxtMainSearch" value="#{userCategoryBean.searchUserCategoryName}" autocomplete="off">
                    <f:ajax event="keyup" render="dtblUserCategory"/>
                </h:inputText>
            </h:panelGrid>

            <h:dataTable id="dtblUserCategory" value="#{userCategoryBean.getUserCategoriesByCatSubcatName(userCategoryBean.searchUserCategoryName)}" var="uc" 
                         styleClass="cls-table" 
                         headerClass="cls-table-header" 
                         rowClasses="cls-table-odd-row,cls-table-even-row" 
                         columnClasses="cls-table-col1,cls-table-col2,cls-table-col3"
                         > 
                <h:column>
                    <!-- column header -->
                    <f:facet name="header">#{langsys['User']} #{langsys['Category']} #{langsys['Name']}</f:facet>
                    <!-- row record -->
                    #{uc.userCategoryName}
                </h:column>

                <h:column>
                    <!-- column header -->
                    <f:facet name="header">#{langsys['Action']}</f:facet>
                    <!-- row record -->
                    <h:commandLink value="#{langsys['Edit']}">
                        <f:ajax listener="#{userCategoryBean.displayUserCategory(uc,userCategory)}" execute="@form" render="@form"/>
                    </h:commandLink>
                    &nbsp;
                </h:column>
                
            </h:dataTable>

        </h:form>
    </h:body>
</html>
