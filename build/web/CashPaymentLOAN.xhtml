<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:p="http://primefaces.org/ui">
    <h:head>
        <title>Loan Repayment</title>
        <link href="resources/images/arrow.png" rel="shortcut icon" type="image/x-icon" />         
        <link rel="stylesheet" type="text/css" href="style.css?ln=css"/>
        <script  language="javascript">
            function confirmDelete()
            {
                return confirm('Are you sure you want to delete this current record?');
            }
            function alertSave()
            {
                return alert('Record saved successfully!');
            }
            function confirmCancel()
            {
                return confirm('Are you sure you want to Cancel this payment record?');
            }
            function alertSave()
            {
                return alert('Record saved successfully!');
            }
        </script> 
    </h:head>
    <f:metadata>
        <f:viewAction action="#{accCurrencyBean.refreshCurrencyListActive()}"/>
        <f:viewAction action="#{navigationBean.checkAccessDenied(utilityBean.convertIntAsString(33), 'View')}"/>
        <f:viewAction action="#{navigationBean.checkLicenseExpired()}"/>
        <f:viewAction action="#{payBean.initClearPayReceipt()}"/>
        <f:viewAction action="#{payBean.initClearPayPayTranss(pay,payBean.selectedBillTransactor,payTransBean.payTranss,payBean,trans)}" />
        <f:viewAction action="#{payBean.initCurrencyCode(15,pay)}"/>
    </f:metadata>
    <f:event listener="#{navigationBean.checkCurrentPage('CASH PAYMENT','','')}" type="preRenderView" />
    <h:body>
        <ui:include src="Menu.xhtml"/>
        <h:form id="formPay" styleClass="clsMainFrom" onkeypress="if (event.keyCode == 13)
                    return false;">

            <h:panelGrid styleClass="clsGridMainHeader" columns="3">
                <h:outputLabel styleClass="clsLabelTop" id="olblPaymentHeader" value="#{langsys['Cash']} #{langsys['Payment']}"/>
                <h:outputLabel style="background-color:#7BC043;color: white;" value="#{langsys['Repayment']} #{langsys['of']} #{langsys['Loan']} #{langsys['Installment']}"/>
                <h:outputLabel style="background-color:#7BC043;color: white;" value="#{langsys['Ledger']}:#{langsys['Cash']}↓ #{langsys['Loan']}↓ #{langsys['Interest']}↑"/>
            </h:panelGrid>
            <h:panelGrid id="pnlSearch" styleClass="clsGridMainInput" style="background-color: #b3f2b3;width: 100%;">
                <h:panelGrid columns="4">
                    <h:outputLabel  value="#{langsys['Currency']}:"/>
                    <h:selectOneMenu styleClass="clsMenu" id="menuCurrency" value="#{pay.currencyCode}">
                        <f:selectItems value="#{accCurrencyBean.currencyList}" var="ac" itemLabel="#{ac.currencyCode}" itemValue="#{ac.currencyCode}"/>
                        <f:ajax event="change" execute="@this" render="pnlInput pnlButtons"/>
                    </h:selectOneMenu>
                    <h:outputLabel  value="#{langsys['Select']} #{langsys['Current']}/#{langsys['Long']} #{langsys['Term']} #{langsys['Loan']} #{langsys['Account']}:"/>
                    <h:selectOneMenu styleClass="clsMenu" style="width: 350px;" id="menuAccount2" value="#{pay.accChildAccountId2}">
                        <f:selectItem itemValue="" itemLabel=""/>
                        <f:selectItems value="#{accChildAccountBean.getAccChildAccounts('2-00-000-050','2-10-000-010',0,0)}" var="ca" itemLabel="#{ca.childAccountCode} (#{ca.childAccountName})" itemValue="#{ca.accChildAccountId}"/>
                        <f:ajax event="change" render="pnlButtons"/>
                        <f:ajax event="change" render="pnlButtons"/>
                    </h:selectOneMenu>
                </h:panelGrid>
            </h:panelGrid>

            <h:panelGrid id="pnlInput" columns="1">
                <h:panelGrid id="pnlInputDetails" styleClass="clsGridMainInput" columns="6">
                    <h:outputLabel  value="#{langsys['Principal']} #{langsys['Amount']}:"/>
                    <h:inputText value="#{pay.principalAmount}" style="width: 156px;">
                        <f:convertNumber pattern="###,###,###,###.########" locale="#{utilityBean.convertLocaleToString()}"/>
                        <f:ajax event="change" listener="#{pay.setPaidAmount(pay.principalAmount+pay.interestAmount)}" execute="@this" render="@this itxtPaidAmount"/>
                    </h:inputText>
                    <h:outputLabel  value="#{langsys['Interest']} #{langsys['Amount']}:"/>
                    <h:inputText value="#{pay.interestAmount}" style="width: 143px;">
                        <f:convertNumber pattern="###,###,###,###.########" locale="#{utilityBean.convertLocaleToString()}"/>
                        <f:ajax event="change" listener="#{pay.setPaidAmount(pay.principalAmount+pay.interestAmount)}" execute="@this" render="@this itxtPaidAmount"/>
                    </h:inputText>
                    <h:outputLabel  value="#{langsys['Amount']} #{langsys['Paid']}:"/>
                    <h:inputText id="itxtPaidAmount" value="#{pay.paidAmount}" disabled="true" style="width: 233px;">
                        <f:convertNumber pattern="###,###,###,###.########" locale="#{utilityBean.convertLocaleToString()}"/>
                        <f:ajax event="change" execute="@form" render="@form"/>
                    </h:inputText>

                    <h:outputLabel  value="#{langsys['Payment']} #{langsys['Date']}:"/>
                    <p:calendar styleClass="clsInput" id="calPaymentDate"  pattern="#{companySetting.getDateFormat()}" navigator="true" showButtonPanel="true" readonlyInput="true" value="#{pay.payDate}" size="12" disabled="#{generalUserSetting.isAllowedToBackDate==0}"/>
                    <h:outputLabel  value="#{langsys['Payment']} #{langsys['Method']}:"/>
                    <h:selectOneMenu styleClass="clsMenu" id="menuPayMethod" value="#{pay.payMethodId}" style="width: 150px;">
                        <f:selectItem itemValue="" itemLabel=""/>
                        <f:selectItems value="#{payMethodBean.getPayMethodsActiveIn('1,2,3,4,5,11')}" var="pm" itemLabel="#{pm.payMethodName}" itemValue="#{pm.payMethodId}"/>
                        <f:ajax event="change" execute="@this menuCurrency" render="menuAccount"/>
                    </h:selectOneMenu>
                    <h:outputLabel  value="#{langsys['Paid']} #{langsys['from']} #{langsys['Account']}:"/>
                    <h:selectOneMenu styleClass="clsMenu" style="width: 240px;" id="menuAccount" value="#{pay.accChildAccountId}">
                        <f:selectItem itemValue="" itemLabel=""/>
                        <f:selectItems value="#{accChildAccountBean.getAccChildAccountsForCashPayment(pay.currencyCode, pay.payMethodId,generalUserSetting.getCurrentStore().storeId,generalUserSetting.getCurrentUser().userDetailId)}" var="ca" itemLabel="#{ca.childAccountCode} (#{ca.childAccountName})" itemValue="#{ca.accChildAccountId}"/>
                    </h:selectOneMenu>

                    <h:outputLabel  value="#{langsys['Reference']} #{langsys['No.']}:"/>
                    <h:inputText id="itxtPayRefNo" value="#{pay.payRefNo}" styleClass="clsInputTransItem" style="width: 156px;"/>
                    <h:outputLabel  value="#{langsys['Status']}:"/>
                    <h:selectOneMenu styleClass="clsMenu" id="menuStatus" value="#{pay.status}" style="width: 150px;">
                        <f:selectItem itemLabel="#{langsys['Cleared']}" itemValue="1"/>
                        <f:selectItem itemLabel="#{langsys['Not']} #{langsys['Cleared']}" itemValue="0"/>
                    </h:selectOneMenu>
                    <h:outputLabel  value="#{langsys['Status']} #{langsys['Description']}:"/>
                    <h:inputText id="itxtStatusDesc" value="#{pay.statusDesc}" styleClass="clsInputTransItem" style="width: 233px;"/>
                </h:panelGrid>
            </h:panelGrid>
            <h:panelGrid id="pnlButtons" styleClass="clsGridMainCommands" columns="1">
                <h:panelGrid styleClass="clsGridMainCommands1" columns="4">
                    <p:commandButton styleClass="clsButtonBig" value="#{langsys['SAVE']} (ALT+S)" accesskey="s" onclick="PF('statusDialog').show()" onsuccess="PF('statusDialog').hide()">
                        <p:dialog widgetVar="statusDialog" height="100" position="center" modal="true" draggable="false" closable="false" resizable="false" showHeader="false">
                            <p:graphicImage name="/images/ajax-loader.gif"/>
                        </p:dialog>
                        <p:ajax listener="#{payBean.saveCashPayment(pay,payTransBean.payTranss,15,33)}" process="@form" update="@form"/>
                    </p:commandButton>
                    <p:commandButton styleClass="clsButtonBig" value="#{langsys['CLEAR']} (ALT+C)" accesskey="c">
                        <p:ajax listener="#{payBean.clearPayPayTranss(pay,payTransBean.payTranss)}" process="@form" update="@form"/>
                    </p:commandButton>
                </h:panelGrid>
            </h:panelGrid>

            <h:panelGrid styleClass="clsGridMainMessages" columns="1">
                <h:outputLabel styleClass="clsActionMessage" id="olblActionMessage" value="#{payBean.actionMessage}"/>
                <h:messages id="msgsMainMessage" style="color: red"/><br/>
            </h:panelGrid>
            <!-- RECEIPT/VOUCHER STARTS HERE -->
            <p:panel id="pnlReceipt">
                <ui:include src="#{transBean.getPrintFileName('PARENT',transactionTypeBean.getTransactionType(15),transBean.overridePrintVersion)}"/>
            </p:panel>
            <!-- RECEIPT/VOUCHER ENDS HERE -->
        </h:form>
    </h:body>
</html>
