# VendorPlus Nginx Configuration
# Save this as: /etc/nginx/sites-available/vendorplus

server {
    listen 80;
    server_name vendorplusuganda.com www.vendorplusuganda.com;
    
    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name vendorplusuganda.com www.vendorplusuganda.com;

    # SSL Configuration (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/vendorplusuganda.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vendorplusuganda.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Logging
    access_log /var/log/nginx/vendorplus-access.log;
    error_log /var/log/nginx/vendorplus-error.log;

    # Main proxy configuration
    location / {
        proxy_pass http://localhost:8080/vendorplus/;
        
        # Essential headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Important for JSF applications
        proxy_redirect http://localhost:8080/vendorplus/ https://$host/;
        proxy_redirect http://$host/vendorplus/ https://$host/;
        
        # Timeouts for long-running requests
        proxy_connect_timeout 600;
        proxy_send_timeout 600;
        proxy_read_timeout 600;
        send_timeout 600;
        
        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # Increase max upload size (for file uploads)
    client_max_body_size 100M;
}
