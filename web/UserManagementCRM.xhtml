<?xml version='1.0 encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">

<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui"
      xmlns:c="http://xmlns.jcp.org/jsp/jstl/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

    <h:head>
        <title>User Management CRM - VendorPlus</title>
        <link rel="stylesheet" type="text/css" href="style.css?ln=css"/>
        <style type="text/css">
            .badge-success {
                padding: 4px 8px;
                border-radius: 4px;
                font-weight: bold;
                background-color: #28a745;
                color: white;
            }
            .badge-danger {
                padding: 4px 8px;
                border-radius: 4px;
                font-weight: bold;
                background-color: #dc3545;
                color: white;
            }
            .badge-secondary {
                padding: 4px 8px;
                border-radius: 4px;
                font-weight: bold;
                background-color: #6c757d;
                color: white;
            }
            .stats-bar {
                background-color: #7BC043;
                height: 20px;
                display: inline-block;
            }
        </style>
    </h:head>
    <f:metadata>
        <f:viewAction action="#{userManagementCRMBean.initializeDashboard()}"/>
    </f:metadata>
    <h:body>
        <h:form id="form">
            <p:growl id="messages" showDetail="true"/>
            
            <!-- Header -->
            <h:panelGrid columns="1" style="width: 100%; background-color: #7BC043; color: white; padding: 1rem; margin-bottom: 2rem;">
                <h:outputLabel value="User Management CRM Dashboard" style="font-size: 24px; font-weight: bold;"/>
                <h:outputLabel value="Monitor and manage all registered users" style="font-size: 14px;"/>
            </h:panelGrid>

            <!-- Analytics Cards (Priority #4) -->
            <h:panelGrid columns="4" style="width: 100%; margin-bottom: 2rem;" cellpadding="10">
                <p:panel header="Total Users" style="background-color: #f5f5f5; text-align: center;">
                    <h:outputLabel value="#{userManagementCRMBean.totalUsers}" style="font-size: 36px; font-weight: bold; color: #7BC043;"/>
                    <br/>
                    <h:outputLabel value="Registered Users" style="font-size: 12px; color: #666;"/>
                </p:panel>
                
                <p:panel header="Active Users" style="background-color: #f5f5f5; text-align: center;">
                    <h:outputLabel value="#{userManagementCRMBean.activeUsers}" style="font-size: 36px; font-weight: bold; color: #28a745;"/>
                    <br/>
                    <h:outputLabel value="Unlocked & Active" style="font-size: 12px; color: #666;"/>
                </p:panel>
                
                <p:panel header="Locked Users" style="background-color: #f5f5f5; text-align: center;">
                    <h:outputLabel value="#{userManagementCRMBean.lockedUsers}" style="font-size: 36px; font-weight: bold; color: #dc3545;"/>
                    <br/>
                    <h:outputLabel value="Deactivated Accounts" style="font-size: 12px; color: #666;"/>
                </p:panel>
                
                <p:panel header="Registrations (30 days)" style="background-color: #f5f5f5; text-align: center;">
                    <h:outputLabel value="#{userManagementCRMBean.registrationStats.size()}" style="font-size: 36px; font-weight: bold; color: #17a2b8;"/>
                    <br/>
                    <h:outputLabel value="New Registrations" style="font-size: 12px; color: #666;"/>
                </p:panel>
            </h:panelGrid>

            <!-- Tabbed Interface -->
            <p:tabView dynamic="true" cache="false">
                
                <!-- Tab 1: User List/Search (Priority #1) -->
                <p:tab title="User Management">
                    <h:panelGrid columns="1" style="width: 100%;">
                        <!-- Filters -->
                        <p:panel header="Search & Filter Users" toggleable="true" style="margin-bottom: 1rem;">
                            <h:panelGrid columns="5" cellpadding="5">
                                <p:outputLabel value="Search:"/>
                                <p:inputText id="searchText" value="#{userManagementCRMBean.searchText}" 
                                             style="width: 200px;" placeholder="Username, name, or email"/>
                                
                                <p:outputLabel value="Status:"/>
                                <p:selectOneMenu id="statusFilter" value="#{userManagementCRMBean.statusFilter}" style="width: 150px;">
                                    <f:selectItem itemLabel="All Users" itemValue="ALL"/>
                                    <f:selectItem itemLabel="Active Only" itemValue="ACTIVE"/>
                                    <f:selectItem itemLabel="Locked Only" itemValue="LOCKED"/>
                                </p:selectOneMenu>
                                
                                <h:panelGroup>
                                    <p:commandButton value="Apply Filters" 
                                                     action="#{userManagementCRMBean.applyFilters()}" 
                                                     update="userTable messages"
                                                     style="margin-right: 5px;"/>
                                    <p:commandButton value="Clear" 
                                                     action="#{userManagementCRMBean.clearFilters()}" 
                                                     update="searchText statusFilter userTable messages"/>
                                </h:panelGroup>
                            </h:panelGrid>
                        </p:panel>
                        
                        <!-- User List Table (Priority #5 - Management Actions) -->
                        <p:dataTable id="userTable" value="#{userManagementCRMBean.userList}" var="user" 
                                     paginator="true" rows="20" paginatorPosition="both"
                                     emptyMessage="No users found"
                                     style="margin-top: 1rem;">
                            <f:facet name="header">
                                User List (#{userManagementCRMBean.userList.size()} users)
                            </f:facet>
                            
                            <p:column headerText="ID" style="width: 50px;">
                                <h:outputText value="#{user.userId}"/>
                            </p:column>
                            
                            <p:column headerText="Username" sortBy="#{user.userName}" filterBy="#{user.userName}">
                                <h:outputText value="#{user.userName}"/>
                            </p:column>
                            
                            <p:column headerText="Full Name" sortBy="#{user.firstName}">
                                <h:outputText value="#{user.fullName}"/>
                            </p:column>
                            
                            <p:column headerText="Email" sortBy="#{user.emailAddress}">
                                <h:outputText value="#{user.emailAddress}"/>
                            </p:column>
                            
                            <p:column headerText="Phone">
                                <h:outputText value="#{user.phoneNo}"/>
                            </p:column>
                            
                            <p:column headerText="Status" style="width: 100px; text-align: center;">
                                <h:outputLabel value="#{user.statusBadge}" 
                                              styleClass="#{user.isLocked eq 'Yes' ? 'badge-danger' : 'badge-success'}"/>
                            </p:column>
                            
                            <p:column headerText="Admin" style="width: 80px; text-align: center;">
                                <h:outputText value="#{user.isAdmin eq 'Yes' ? '✓' : ''}" style="font-size: 18px; color: #7BC043;"/>
                            </p:column>
                            
                            <p:column headerText="Registration Date" sortBy="#{user.registrationDate}" style="width: 150px;">
                                <h:outputText value="#{user.registrationDate}">
                                    <f:convertDateTime pattern="yyyy-MM-dd HH:mm"/>
                                </h:outputText>
                            </p:column>
                            
                            <p:column headerText="Last Login" sortBy="#{user.lastLogin}" style="width: 150px;">
                                <h:outputText value="#{user.lastLogin}">
                                    <f:convertDateTime pattern="yyyy-MM-dd HH:mm"/>
                                </h:outputText>
                                <h:outputText value="Never" rendered="#{user.lastLogin == null}"/>
                            </p:column>
                            
                            <p:column headerText="Actions" style="width: 200px; text-align: center;">
                                <p:commandButton value="Unlock" 
                                                 action="#{userManagementCRMBean.unlockUser(user)}" 
                                                 update="userTable messages form"
                                                 rendered="#{user.isLocked eq 'Yes'}"
                                                 style="margin-right: 5px; background-color: #28a745;"/>
                                
                                <p:commandButton value="Lock" 
                                                 action="#{userManagementCRMBean.lockUser(user)}" 
                                                 update="userTable messages form"
                                                 rendered="#{user.isLocked eq 'No'}"
                                                 style="margin-right: 5px; background-color: #ffc107;">
                                    <p:confirm header="Confirmation" message="Are you sure you want to lock this user?" icon="pi pi-exclamation-triangle"/>
                                </p:commandButton>
                                
                                <p:commandButton value="Delete" 
                                                 action="#{userManagementCRMBean.deleteUser(user)}" 
                                                 update="userTable messages form"
                                                 style="background-color: #dc3545;">
                                    <p:confirm header="Confirmation" message="Are you sure you want to delete this user? This action cannot be undone!" icon="pi pi-exclamation-triangle"/>
                                </p:commandButton>
                            </p:column>
                        </p:dataTable>
                    </h:panelGrid>
                </p:tab>
                
                <!-- Tab 2: Login Activity (Priority #3) -->
                <p:tab title="Login Activity">
                    <h:panelGrid columns="1" style="width: 100%;">
                        <p:panel header="Recent Login Activity" style="margin-bottom: 1rem;">
                            <h:outputLabel value="Showing last #{userManagementCRMBean.activityLimit} login sessions"/>
                        </p:panel>
                        
                        <p:dataTable id="loginActivityTable" value="#{userManagementCRMBean.loginActivityList}" var="activity" 
                                     paginator="true" rows="25" paginatorPosition="both"
                                     emptyMessage="No login activity found">
                            <f:facet name="header">
                                Login Activity Log
                            </f:facet>
                            
                            <p:column headerText="User" sortBy="#{activity.userName}" style="width: 150px;">
                                <h:outputText value="#{activity.userName}"/>
                                <br/>
                                <h:outputText value="#{activity.fullName}" style="font-size: 11px; color: #666;"/>
                            </p:column>
                            
                            <p:column headerText="Login Time" sortBy="#{activity.loginTime}" style="width: 150px;">
                                <h:outputText value="#{activity.loginTime}">
                                    <f:convertDateTime pattern="yyyy-MM-dd HH:mm:ss"/>
                                </h:outputText>
                            </p:column>
                            
                            <p:column headerText="Logout Time" style="width: 150px;">
                                <h:outputText value="#{activity.logoutTime}">
                                    <f:convertDateTime pattern="yyyy-MM-dd HH:mm:ss"/>
                                </h:outputText>
                                <h:outputText value="Still Active" rendered="#{activity.logoutTime == null}" style="color: #28a745; font-weight: bold;"/>
                            </p:column>
                            
                            <p:column headerText="Status" style="width: 100px; text-align: center;">
                                <h:outputLabel value="#{activity.status}" 
                                              styleClass="#{activity.logoutTime == null ? 'badge-success' : 'badge-secondary'}"/>
                            </p:column>
                            
                            <p:column headerText="IP Address" sortBy="#{activity.ipAddress}" style="width: 150px;">
                                <h:outputText value="#{activity.ipAddress}"/>
                            </p:column>
                            
                            <p:column headerText="Host Name">
                                <h:outputText value="#{activity.hostName}"/>
                            </p:column>
                            
                            <p:column headerText="Store" sortBy="#{activity.storeName}" style="width: 150px;">
                                <h:outputText value="#{activity.storeName}"/>
                            </p:column>
                        </p:dataTable>
                    </h:panelGrid>
                </p:tab>
                
                <!-- Tab 3: Analytics (Priority #4) -->
                <p:tab title="Analytics & Reports">
                    <h:panelGrid columns="1" style="width: 100%;">
                        <p:panel header="Registration Statistics (Last 30 Days)" style = "margin-bottom: 1rem;">
                            <p:dataTable id="statsTable" value="#{userManagementCRMBean.registrationStats}" var="stat" 
                                         emptyMessage="No registration data available">
                                <p:column headerText="Date" sortBy="#{stat.registrationDate}">
                                    <h:outputText value="#{stat.registrationDate}">
                                        <f:convertDateTime pattern="yyyy-MM-dd"/>
                                    </h:outputText>
                                </p:column>
                                
                                <p:column headerText="Registrations">
                                    <h:outputText value="#{stat.registrationsCount}"/>
                                </p:column>
                                
                                <p:column headerText="Graph">
                                    <h:panelGroup layout="block" styleClass="stats-bar" 
                                                  style="#{stat.barWidthStyle}"/>
                                </p:column>
                            </p:dataTable>
                        </p:panel>
                        
                        <p:panel header="Summary">
                            <h:panelGrid columns="2" cellpadding="10">
                                <h:outputLabel value="Total Registered Users:" style="font-weight: bold;"/>
                                <h:outputLabel value="#{userManagementCRMBean.totalUsers}"/>
                                
                                <h:outputLabel value="Active Users:" style="font-weight: bold;"/>
                                <h:outputLabel value="#{userManagementCRMBean.activeUsers}"/>
                                
                                <h:outputLabel value="Locked Users:" style="font-weight: bold;"/>
                                <h:outputLabel value="#{userManagementCRMBean.lockedUsers}"/>
                                
                                <h:outputLabel value="Activation Rate:" style="font-weight: bold;"/>
                                <h:outputLabel value="#{userManagementCRMBean.totalUsers > 0 ? (userManagementCRMBean.activeUsers * 100 / userManagementCRMBean.totalUsers) : 0}%"/>
                            </h:panelGrid>
                        </p:panel>
                    </h:panelGrid>
                </p:tab>
            </p:tabView>
            
            <!-- Confirmation Dialog -->
            <p:confirmDialog global="true" showEffect="fade" hideEffect="fade" responsive="true" width="350">
                <p:commandButton value="Yes" type="button" styleClass="ui-confirmdialog-yes" icon="pi pi-check"/>
                <p:commandButton value="No" type="button" styleClass="ui-confirmdialog-no" icon="pi pi-times"/>
            </p:confirmDialog>
        </h:form>
    </h:body>
</html>
